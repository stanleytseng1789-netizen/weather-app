<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f8f8c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>&#22825;&#27683; App</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="weather-panel" aria-label="&#22825;&#27683;&#26597;&#35426;">
        <header class="topbar">
          <div>
            <p class="eyebrow">Weather Now</p>
            <h1>&#22825;&#27683; App</h1>
          </div>
          <button class="unit-toggle" id="unitToggle" type="button" aria-label="&#20999;&#25563;&#28331;&#24230;&#21934;&#20301;">
            <span id="unitLabel">C</span>
          </button>
        </header>

        <form class="search-form" id="searchForm">
          <label class="sr-only" for="cityInput">&#36664;&#20837;&#22478;&#24066;</label>
          <input
            id="cityInput"
            name="city"
            type="search"
            autocomplete="off"
            inputmode="search"
            placeholder="&#36664;&#20837;&#22478;&#24066;&#65292;&#20363;&#22914; Taipei&#12289;Tokyo&#12289;London"
            required
          />
          <button type="submit">&#26597;&#35426;</button>
        </form>

        <section class="hero-weather" id="currentWeather" aria-live="polite">
          <div class="hero-copy">
            <p class="location" id="locationName">&#21488;&#21271;&#24066;</p>
            <p class="condition" id="conditionText">&#35712;&#21462;&#22825;&#27683;&#20013;...</p>
            <p class="updated" id="updatedTime">&#28310;&#20633;&#21462;&#24471;&#26368;&#26032;&#36039;&#26009;</p>
          </div>
          <div class="temp-wrap">
            <div class="sky-visual" id="skyVisual" data-weather="loading" aria-hidden="true">
              <span class="sun-core"></span>
              <span class="cloud cloud-one"></span>
              <span class="cloud cloud-two"></span>
              <span class="rain rain-one"></span>
              <span class="rain rain-two"></span>
              <span class="rain rain-three"></span>
            </div>
            <div class="weather-symbol" id="weatherSymbol" aria-hidden="true">--</div>
            <p class="temperature"><span id="currentTemp">--</span><span id="unitMark">&deg;C</span></p>
          </div>
        </section>

        <section class="stats-grid" aria-label="&#30446;&#21069;&#22825;&#27683;&#32048;&#31680;">
          <article class="stat">
            <span>&#39636;&#24863;</span>
            <strong id="feelsLike">--</strong>
          </article>
          <article class="stat">
            <span>&#28629;&#24230;</span>
            <strong id="humidity">--</strong>
          </article>
          <article class="stat">
            <span>&#39080;&#36895;</span>
            <strong id="windSpeed">--</strong>
          </article>
          <article class="stat">
            <span>&#38477;&#38632;&#27231;&#29575;</span>
            <strong id="rainChance">--</strong>
          </article>
        </section>

        <section class="forecast-section">
          <div class="section-heading">
            <h2>&#26410;&#20358; 7 &#22825;</h2>
            <p id="statusText">&#27491;&#22312;&#36617;&#20837;&#38928;&#22577;</p>
          </div>
          <div class="forecast-list" id="forecastList" aria-label="&#19971;&#22825;&#22825;&#27683;&#38928;&#22577;"></div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
